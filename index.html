<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sqft Calculator</title>

<!-- ✅ ONLINE PDF WORKING SCRIPT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eee;}

.app{
max-width:360px;
margin:auto;
background:#fff;
min-height:100vh;
padding:10px;
}

h3{text-align:center;margin:5px 0;}

select{
width:100%;
padding:6px;
margin:8px 0;
font-size:13px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:4px;
font-size:11px;
text-align:center;
}

input{
width:60px;
padding:4px;
}

button{
width:100%;
padding:8px;
margin-top:8px;
border:none;
color:#fff;
}

.main{background:#007bff;}
.pdf{background:red;}

.total{
text-align:center;
margin-top:10px;
font-weight:bold;
font-size:15px;
}
</style>

</head>

<body>

<div class="app">

<h3>Sqft Calculator</h3>

<select id="mode">
<option value="auto">3-6-9-12 (Auto)</option>
<option value="inch">Inch to Inch</option>
</select>

<table id="tbl">
<tr>
<th>No</th>
<th>L</th>
<th>W</th>
<th>Sqft</th>
</tr>

<tr>
<td>1</td>
<td><input type="number" oninput="calc(this)"></td>
<td><input type="number" oninput="calc(this)"></td>
<td class="sq">0</td>
</tr>

</table>

<button class="main" onclick="addRow()">Add Row</button>
<button class="pdf" onclick="downloadPDF()">Download PDF</button>

<div class="total">
Total Sqft: <span id="tot">0</span>
</div>

</div>

<script>

// AUTO SIZE
function fixSize(v){
if(v <= 0) return 0;
return Math.ceil(v / 3) * 3;
}

// CALC
function calc(el){

let mode = document.getElementById("mode").value;

let r = el.parentElement.parentElement;

let l = parseFloat(r.children[1].children[0].value) || 0;
let w = parseFloat(r.children[2].children[0].value) || 0;

let calcL = l;
let calcW = w;

if(mode === "auto"){
calcL = fixSize(l);
calcW = fixSize(w);
}

let sqft = (calcL * calcW) / 144;

r.children[3].innerText = sqft.toFixed(2);

total();
}

// TOTAL
function total(){
let t = 0;
document.querySelectorAll(".sq").forEach(e=>{
t += parseFloat(e.innerText) || 0;
});
document.getElementById("tot").innerText = t.toFixed(2);
}

// ADD ROW
function addRow(){
let t = document.getElementById("tbl");
let n = t.rows.length;

let r = t.insertRow();

r.innerHTML = `
<td>${n}</td>
<td><input type="number" oninput="calc(this)"></td>
<td><input type="number" oninput="calc(this)"></td>
<td class="sq">0</td>
`;
}

// ✅ PDF DOWNLOAD WORKING
function downloadPDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let y = 10;

doc.text("Sqft Calculator", 10, y);
y += 10;

document.querySelectorAll("#tbl tr").forEach((row)=>{

let text = "";

for(let j=0;j<row.children.length;j++){
text += row.children[j].innerText + "   ";
}

doc.text(text, 10, y);
y += 7;

});

doc.text("Total: " + document.getElementById("tot").innerText, 10, y+5);

doc.save("sqft.pdf");
}

</script>

</body>
</html>
